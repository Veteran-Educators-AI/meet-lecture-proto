<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student - Meet Lecture Proto</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; padding: 20px; background: #f8f9fa; color: #1a1a2e; }
    .container { max-width: 900px; margin: 0 auto; }
    input, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
    button { padding: 10px 16px; margin-top: 10px; margin-right: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; background: #2d3436; color: #fff; transition: background 0.2s; }
    button:hover:not(:disabled) { background: #0984e3; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-top: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    code { background: #f5f5f5; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
    .status { font-weight: 650; }
    h1 { margin: 0 0 4px; font-size: 1.6em; }
    .subtitle { color: #636e72; margin-bottom: 16px; }

    /* Slide styles */
    #slideContainer { display: none; margin-top: 16px; }
    .slide {
      background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #16213e 100%);
      color: #f0f0f0;
      border-radius: 14px;
      padding: 36px 32px;
      min-height: 340px;
      position: relative;
      overflow: hidden;
    }
    .slide::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -30%;
      width: 60%;
      height: 200%;
      background: radial-gradient(ellipse, rgba(9,132,227,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .slide h1 { color: #74b9ff; font-size: 1.5em; margin: 0 0 4px; }
    .slide .slide-subtitle { color: #81ecec; font-size: 0.95em; margin-bottom: 20px; font-weight: 500; }
    .slide h2 { color: #dfe6e9; font-size: 1.15em; margin: 16px 0 8px; }
    .slide h3 { color: #74b9ff; font-size: 1.05em; margin: 14px 0 6px; }
    .slide ul, .slide ol { padding-left: 22px; line-height: 1.7; }
    .slide li { margin-bottom: 4px; }
    .slide p { line-height: 1.6; margin: 8px 0; }
    .slide em { color: #ffeaa7; }
    .slide strong { color: #fff; }

    .slide .formula {
      background: rgba(116,185,255,0.15);
      border: 1px solid rgba(116,185,255,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 1.3em;
      font-weight: 700;
      text-align: center;
      margin: 16px 0;
      color: #74b9ff;
      letter-spacing: 0.5px;
    }
    .slide .example {
      background: rgba(255,255,255,0.07);
      border-left: 4px solid #fdcb6e;
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      margin: 12px 0;
    }
    .slide .highlight {
      background: rgba(253,203,110,0.15);
      border: 1px solid rgba(253,203,110,0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin: 12px 0;
      text-align: center;
    }
    .slide .takeaway {
      background: rgba(0,206,201,0.1);
      border: 1px solid rgba(0,206,201,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      margin: 12px 0;
    }
    .slide .note { color: #b2bec3; font-style: italic; font-size: 0.9em; }

    .slide table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .slide .var-table td { padding: 6px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .slide .var-table td:first-child { width: 40px; color: #74b9ff; font-weight: 700; font-size: 1.1em; }
    .slide .calc-table td, .slide .calc-table th {
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;
    }
    .slide .calc-table th { color: #81ecec; font-size: 0.9em; }

    .slide .comparison, .slide .comparison-big {
      display: flex; gap: 16px; margin: 16px 0; flex-wrap: wrap; justify-content: center;
    }
    .slide .compare-box {
      flex: 1; min-width: 140px; background: rgba(255,255,255,0.06);
      border-radius: 10px; padding: 14px; text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .slide .compare-box.simple { border-color: rgba(214,48,49,0.4); }
    .slide .compare-box.compound { border-color: rgba(0,206,201,0.4); }
    .slide .big-number { font-size: 1.8em; font-weight: 800; color: #fdcb6e; margin: 6px 0; }

    .slide .two-col { display: flex; gap: 16px; flex-wrap: wrap; }
    .slide .pro-col, .slide .con-col { flex: 1; min-width: 200px; }
    .slide .pro-col { background: rgba(0,206,201,0.08); border-radius: 10px; padding: 12px 16px; }
    .slide .con-col { background: rgba(214,48,49,0.08); border-radius: 10px; padding: 12px 16px; }

    .slide-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .slide-nav span { color: #636e72; font-size: 0.9em; }

    /* Fullscreen button */
    .fs-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #dfe6e9;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      z-index: 10;
      transition: background 0.2s, transform 0.15s;
      padding: 0;
    }
    .fs-btn:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }

    /* Fullscreen slide wrapper */
    #slideWrapper { position: relative; }
    #slideWrapper:fullscreen,
    #slideWrapper:-webkit-full-screen {
      display: flex;
      flex-direction: column;
      background: #0c0c1d;
    }
    #slideWrapper:fullscreen .slide,
    #slideWrapper:-webkit-full-screen .slide {
      flex: 1;
      min-height: 100vh;
      border-radius: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 80px;
      font-size: 1.4em;
    }
    #slideWrapper:fullscreen .slide h1,
    #slideWrapper:-webkit-full-screen .slide h1 {
      font-size: 2em;
    }
    #slideWrapper:fullscreen .player-bar,
    #slideWrapper:-webkit-full-screen .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      border-radius: 0;
      z-index: 20;
      border: none;
      border-top: 1px solid #e0e0e0;
    }
    #slideWrapper:fullscreen .fs-btn,
    #slideWrapper:-webkit-full-screen .fs-btn {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 30;
    }

    /* Player bar */
    .player-bar {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px 20px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .player-bar audio { flex: 1; }
    .player-bar .seg-label { font-weight: 600; color: #2d3436; white-space: nowrap; font-size: 0.9em; }
  </style>
</head>
<body>
<div class="container">
  <h1>📚 Student View</h1>
  <p class="subtitle">Join a lecture session and follow along</p>

  <div class="card" id="joinCard">
    <label>Session code</label>
    <input id="code" placeholder="e.g. INT2826" />
    <label>Your name</label>
    <input id="name" placeholder="Your name" />
    <button id="join">Join Session</button>
    <div id="joinMsg" style="margin-top:8px;color:#d63031;font-weight:500;"></div>
  </div>

  <div id="lectureCard" style="display:none;">
    <div class="card">
      <div>Session: <code id="codeShow"></code></div>
      <div class="status" style="margin-top:8px;">Status: <span id="status">—</span></div>
    </div>

    <div id="slideContainer">
      <div id="slideWrapper">
        <div class="slide" id="slideContent">
          <button class="fs-btn" id="fsBtn" title="Fullscreen">⛶</button>
        </div>
        <div class="slide-nav" id="slideNav" style="margin-top:10px; gap:10px;">
          <button id="prevSlide" type="button">◀ Prev</button>
          <span id="slideCounter" style="flex:1; text-align:center;">Slide 1/1</span>
          <button id="nextSlide" type="button">Next ▶</button>
        </div>
        <div class="player-bar">
          <span class="seg-label" id="segLabel">Segment 1/1</span>
          <audio id="player" controls></audio>
        </div>
      </div>
    </div>

    <div id="noSlides" class="card" style="display:none;">
      <div style="margin-top:10px;">
        <audio id="playerFallback" controls></audio>
      </div>
      <div style="margin-top:8px;color:#666;">
        Lecture auto-starts when teacher starts the session.
      </div>
    </div>
  </div>

  <div class="card" id="questionCard" style="display:none;">
    <h3>Ask a question</h3>

    <div id="qDisabled" style="display:none;color:#d63031; font-weight:650;">Questions are disabled until the lecture starts.</div>

    <label>Text question</label>
    <textarea id="qText" rows="3" placeholder="Type your question..."></textarea>
    <button id="sendText">Send text question</button>

    <hr style="border:none;border-top:1px solid #eee;margin:16px 0;" />

    <div>
      <div><b>Audio question</b></div>
      <button id="rec">🎤 Start recording</button>
      <button id="stop" disabled>⏹ Stop</button>
      <button id="sendAudio" disabled>📤 Send audio question</button>
      <div style="margin-top:8px;">
        <audio id="preview" controls></audio>
      </div>
    </div>

    <div id="qMsg" style="margin-top:10px;font-weight:500;"></div>
  </div>
</div>

<script>
let sessionCode = null;
let studentId = null;
let ws = null;
let state = null;
let slides = null;

const $ = (id) => document.getElementById(id);

function setStatus() {
  if (!state) return;
  const started = state.started ? 'Started' : 'Waiting for teacher';
  const playing = state.playing ? '▶ Playing' : '⏸ Paused';
  const seg = `${state.currentIndex + 1}/${state.playlist.length}`;
  $('status').textContent = `${started} • ${playing} • Segment ${seg}`;

  const canAsk = !!state.started;
  $('qDisabled').style.display = canAsk ? 'none' : 'block';
  $('sendText').disabled = !canAsk;
  $('rec').disabled = !canAsk;
  if (!canAsk) {
    $('stop').disabled = true;
    $('sendAudio').disabled = true;
  }
}

function renderSlide() {
  if (!slides || !slides.length || !state) return;
  const idx = state.currentIndex;
  const slide = slides[idx] || slides[slides.length - 1];
  if (!slide) return;

  let html = '<button class="fs-btn" id="fsBtn" title="Fullscreen" onclick="toggleFullscreen()">⛶</button>';
  if (slide.title) html += `<h1>${slide.title}</h1>`;
  if (slide.subtitle) html += `<div class="slide-subtitle">${slide.subtitle}</div>`;
  if (slide.content) html += slide.content;
  $('slideContent').innerHTML = html;
  // Update button state if already fullscreen
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    $('fsBtn').textContent = '✕';
    $('fsBtn').title = 'Exit fullscreen';
  }
  $('segLabel').textContent = `Segment ${idx + 1}/${state.playlist.length}`;
  // Update slide counter and nav button states
  $('slideCounter').textContent = `Slide ${idx + 1}/${slides.length}`;
  $('prevSlide').disabled = idx <= 0;
  $('nextSlide').disabled = idx >= slides.length - 1;
}

function loadSegment() {
  if (!state) return;
  const seg = state.playlist[state.currentIndex];
  if (!seg) return;

  const player = slides ? $('player') : $('playerFallback');
  if (player.getAttribute('data-seg') !== seg.id) {
    player.src = seg.url;
    player.setAttribute('data-seg', seg.id);
  }
  if (slides) renderSlide();
}

function syncPlayback() {
  const player = slides ? $('player') : $('playerFallback');
  loadSegment();
  if (!state.started) {
    player.pause();
    return;
  }
  if (state.playing) {
    player.play().catch(()=>{});
  } else {
    player.pause();
  }
}

async function loadSlides(code) {
  try {
    const res = await fetch(`/generated/${code}/slides.json`);
    if (res.ok) {
      slides = await res.json();
      $('slideContainer').style.display = 'block';
      $('noSlides').style.display = 'none';
    } else {
      slides = null;
      $('slideContainer').style.display = 'none';
      $('noSlides').style.display = 'block';
    }
  } catch (e) {
    slides = null;
    $('slideContainer').style.display = 'none';
    $('noSlides').style.display = 'block';
  }
}

function connectWS() {
  ws = new WebSocket(`${location.origin.replace('http','ws')}/?code=${sessionCode}&role=student`);
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'HELLO') {
      state = msg.state;
      setStatus();
      syncPlayback();
      return;
    }
    if (msg.state) state = msg.state;
    if (['SESSION_STARTED','PAUSE_FOR_QUESTION','PAUSE','RESUME','GOTO','PLAYLIST_UPDATED'].includes(msg.type)) {
      setStatus();
      syncPlayback();
    }
  };
}

$('join').onclick = async () => {
  const code = ($('code').value || '').trim().toUpperCase();
  const name = ($('name').value || '').trim();
  $('joinMsg').textContent = '';
  if (!code || !name) {
    $('joinMsg').textContent = 'Please enter code and name.';
    return;
  }
  const res = await fetch(`/api/session/${code}/join`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  const data = await res.json();
  if (!data.ok) {
    $('joinMsg').textContent = `Join failed: ${data.error}`;
    return;
  }
  sessionCode = code;
  studentId = data.studentId;
  state = data.state;

  $('joinCard').style.display = 'none';
  $('lectureCard').style.display = 'block';
  $('questionCard').style.display = 'block';
  $('codeShow').textContent = sessionCode;

  await loadSlides(sessionCode);
  setStatus();
  connectWS();
  syncPlayback();
};

$('sendText').onclick = async () => {
  $('qMsg').textContent = '';
  const text = ($('qText').value || '').trim();
  if (!text) { $('qMsg').textContent = 'Type a question first.'; return; }
  const res = await fetch(`/api/session/${sessionCode}/question/text`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ studentId, text })
  });
  const data = await res.json();
  if (!data.ok) {
    $('qMsg').textContent = `Could not send: ${data.error}`;
    return;
  }
  $('qText').value = '';
  $('qMsg').textContent = '✅ Question sent. Lecture paused.';
};

// Audio recording
let mediaRecorder = null;
let chunks = [];
let recordedBlob = null;

$('rec').onclick = async () => {
  $('qMsg').textContent = '';
  recordedBlob = null;
  $('preview').src = '';
  chunks = [];

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    recordedBlob = new Blob(chunks, { type: chunks[0]?.type || 'audio/webm' });
    $('preview').src = URL.createObjectURL(recordedBlob);
    $('sendAudio').disabled = false;
    $('stop').disabled = true;
    stream.getTracks().forEach(t => t.stop());
  };
  mediaRecorder.start();
  $('stop').disabled = false;
  $('sendAudio').disabled = true;
};

$('stop').onclick = () => {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
};

$('sendAudio').onclick = async () => {
  $('qMsg').textContent = '';
  if (!recordedBlob) { $('qMsg').textContent = 'Record something first.'; return; }
  const fd = new FormData();
  fd.append('studentId', studentId);
  fd.append('audio', recordedBlob, 'question.webm');

  const res = await fetch(`/api/session/${sessionCode}/question/audio`, { method: 'POST', body: fd });
  const data = await res.json();
  if (!data.ok) {
    $('qMsg').textContent = `Could not send audio: ${data.error}`;
    return;
  }
  $('qMsg').textContent = '✅ Audio question sent. Lecture paused.';
  $('sendAudio').disabled = true;
};

// Auto-populate session code from URL path (e.g. /session/INT2826)
const pathMatch = window.location.pathname.match(/^\/session\/([A-Za-z0-9]+)/i);
if (pathMatch) {
  document.addEventListener('DOMContentLoaded', () => {
    const codeInput = $('code');
    if (codeInput) codeInput.value = pathMatch[1].toUpperCase();
  });
}

// Fullscreen toggle
function toggleFullscreen() {
  const wrapper = $('slideWrapper');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (wrapper.requestFullscreen) wrapper.requestFullscreen();
    else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
    $('fsBtn').textContent = '✕';
    $('fsBtn').title = 'Exit fullscreen';
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
$('fsBtn').onclick = toggleFullscreen;
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    $('fsBtn').textContent = '⛶';
    $('fsBtn').title = 'Fullscreen';
  }
});
document.addEventListener('webkitfullscreenchange', () => {
  if (!document.webkitFullscreenElement) {
    $('fsBtn').textContent = '⛶';
    $('fsBtn').title = 'Fullscreen';
  }
});

// Auto-advance to next segment when current one ends
const getPlayer = () => slides ? $('player') : $('playerFallback');
function canNavigateSlides() {
  // Allow teacher/student to navigate only after lecture has started and slides exist
  return !!(slides && slides.length && state && state.started);
}

async function gotoIndex(newIdx) {
  if (!canNavigateSlides()) return;
  newIdx = Math.max(0, Math.min(newIdx, slides.length - 1));
  if (newIdx === state.currentIndex) return;

  // Ask server to update canonical state so everyone stays in sync
  try {
    const res = await fetch(`/api/session/${sessionCode}/goto`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: newIdx })
    });
    const data = await res.json();
    if (!data.ok && data.error) {
      // Fallback: local update (still lets Gregory advance even if API fails)
      state.currentIndex = newIdx;
      setStatus();
      syncPlayback();
    }
  } catch (e) {
    state.currentIndex = newIdx;
    setStatus();
    syncPlayback();
  }
}

function nextSlide() {
  if (!canNavigateSlides()) return;
  gotoIndex(state.currentIndex + 1);
}

function prevSlide() {
  if (!canNavigateSlides()) return;
  gotoIndex(state.currentIndex - 1);
}

document.addEventListener('DOMContentLoaded', () => {
  // Hook up nav buttons
  $('nextSlide').onclick = nextSlide;
  $('prevSlide').onclick = prevSlide;

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!canNavigateSlides()) return;
    // Don't steal keys while typing
    const t = (e.target && (e.target.tagName || '')).toLowerCase();
    if (t === 'input' || t === 'textarea') return;

    if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      nextSlide();
    }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      prevSlide();
    }
  });

  // Auto-advance to next segment when current one ends
  [$('player'), $('playerFallback')].forEach(player => {
    player.addEventListener('ended', () => {
      if (!state || !state.playing) return;
      if (state.currentIndex < state.playlist.length - 1) {
        // Use the same goto flow so slide updates broadcast
        gotoIndex(state.currentIndex + 1);
      }
    });
  });
});
</script>
</body>
</html>
